<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; text-align: center; }
    button { 
      width: 100%; padding: 12px; background: #217346; /* Cor do Excel */
      color: white; font-weight: bold;
      border: none; border-radius: 4px; cursor: pointer; 
    }
    button:disabled { background: #95a5a6; cursor: not-allowed; }
    #status { margin-top: 15px; font-size: 13px; color: #555; word-wrap: break-word; }
  </style>
</head>
<body>
  <h3>EscolaRS Exporter</h3>
  <div style="font-size: 11px; color: #666; margin-bottom: 10px;">
    ⚠️ Mantenha esta janela aberta
  </div>
  <button id="btnExportar">Baixar Excel (.xlsx)</button>
  <div id="status">Pronto.</div>

  <script src="xlsx.mini.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
