<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; padding: 15px; font-family: 'Segoe UI', sans-serif; text-align: center; }
    h3 { margin-top: 0; color: #333; }
    button { 
      width: 100%; padding: 12px; background: #217346; color: white; 
      font-weight: bold; border: none; border-radius: 4px; cursor: pointer; 
      transition: background 0.3s;
      margin-bottom: 15px;
    }
    button:hover { background: #1e6b41; }
    button:disabled { background: #ccc; cursor: wait; }
    #status { font-size: 13px; color: #555; min-height: 20px; margin-top: 5px; }
    .note { font-size: 11px; color: #888; margin-bottom: 15px; display: block; }
    #progress-container {
      width: 100%;
      background-color: #e0e0e0;
      border-radius: 4px;
      overflow: hidden; /* Garante que a barra interna não ultrapasse as bordas */
      display: none; /* Inicia oculto */
    }
    #progress-bar {
      width: 0%;
      height: 8px;
      background-color: #217346; /* Verde do botão */
      border-radius: 4px; /* Desnecessário com overflow:hidden no container, mas não prejudica */
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>
  <h3>EscolaRS Export</h3>
  <span class="note">⚠️ Mantenha esta janela aberta durante o processo.</span>
  
  <button id="btnExportar">Baixar Planilha (.xlsx)</button>
  
  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>
  <div id="status">Aguardando início...</div>

  <script src="xlsx.mini.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
