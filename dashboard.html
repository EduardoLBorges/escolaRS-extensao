<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Notas - EscolaRS Export</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      background: linear-gradient(135deg, #e8f5e9 0%, #f1f8f6 100%);
      color: #1b5e20; 
      margin: 0; 
      min-height: 100vh;
    }
    
    header { 
      background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
      color: white; 
      text-align: center;
      padding: 25px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.15);
    }
    
    header h1 { 
      margin: 0 0 10px 0; 
      font-size: 28px; 
      align-items: center;
      gap: 10px;
    }
    
    header p { margin: 5px 0; font-size: 14px; opacity: 0.95; }
    
    main { 
      padding: 25px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    #loading { 
      text-align: center; 
      padding: 60px 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .controls { 
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }
    
    .control-group { display: flex; flex-direction: column; gap: 8px; }
    .control-group label { font-weight: 600; font-size: 13px; color: #2e7d32; text-transform: uppercase; }
    .control-group select,
    .control-group input { 
      padding: 10px;
      border: 2px solid #c8e6c9;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: #f1f8f6;
      color: #1b5e20;
    }
    
    .control-group select:focus,
    .control-group input:focus { 
      outline: none;
      border-color: #2e7d32;
      background: white;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
    }
    
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }
    
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-left: 5px solid #4caf50;
    }
    
    .stat-card h3 { margin: 0; font-size: 12px; color: #2e7d32; text-transform: uppercase; }
    .stat-card .value { margin: 10px 0 0 0; font-size: 28px; font-weight: bold; color: #1b5e20; }
    .stat-card .sublabel { font-size: 12px; color: #66bb6a; margin-top: 5px; }
    
    .escola-card { 
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 25px;
      overflow: hidden;
    }
    
    .escola-header { 
      padding: 18px;
      background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
      color: white;
      font-size: 18px; 
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .turma-card { 
      padding: 20px;
      border-top: 1px solid #e8f5e9;
    }
    
    .turma-header { 
      font-size: 16px; 
      font-weight: 600; 
      margin-bottom: 15px; 
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 2px solid #c8e6c9;
      color: #1b5e20;
    }
    
    .turma-info { font-size: 12px; color: #66bb6a; }
    
    .tabs-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 25px;
      overflow: hidden;
    }
    
    .tabs-header {
      display: flex;
      border-bottom: 2px solid #e8f5e9;
      overflow-x: auto;
      background: #f1f8f6;
    }
    
    .tab-button {
      padding: 15px 20px;
      border: none;
      background: transparent;
      color: #66bb6a;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }
    
    .tab-button:hover {
      color: #2e7d32;
      background: rgba(46, 125, 50, 0.05);
    }
    
    .tab-button.active {
      color: white;
      background: #2e7d32;
      border-bottom-color: #1b5e20;
    }
    
    .tab-content {
      padding: 20px;
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    table { 
      width: 100%; 
      border-collapse: collapse;
      font-size: 14px;
    }
    
    th, td { 
      padding: 12px; 
      text-align: left; 
      border-bottom: 1px solid #e8f5e9;
    }
    
    th { 
      background-color: #e8f5e9; 
      font-size: 12px; 
      text-transform: uppercase; 
      color: #2e7d32;
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    
    tr:hover { background-color: #f1f8f6; }
    tr:last-child td { border-bottom: none; }
    
    .nota-badge { 
      display: inline-block; 
      padding: 6px 10px; 
      border-radius: 16px; 
      font-weight: bold; 
      color: white; 
      font-size: 13px;
      text-align: center;
      min-width: 40px;
    }
    
    .badge-excelente { background-color: #2e7d32; }
    .badge-bom { background-color: #81c784; }
    .badge-ruim { background-color: #558b2f; }
    
    .status-excellente { color: #2e7d32; font-weight: 600; }
    .status-recuperacao { color: #7cb342; font-weight: 600; }
    .status-reprovado { color: #558b2f; font-weight: 600; }
    
    button {
      padding: 10px 18px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.3s;
    }
    
    button:hover { background: #2e7d32; }
    
    .footer { 
      text-align: center; 
      padding: 20px;
      color: #66bb6a;
      font-size: 12px;
      margin-top: 40px;
    }
    
    .clearfilters { background: #1b5e20; }
    .clearfilters:hover { background: #0d3b1a; }
    
    @media (max-width: 768px) {
      .controls { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr; }
      header h1 { font-size: 20px; }
      table { font-size: 12px; }
      th, td { padding: 8px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>📊 Dashboard de Notas</h1>
    <p id="professor-info"></p>
    <p id="export-date"></p>
  </header>

  <main id="dashboard-container">
    <div id="loading">
      <p style="font-size: 16px; color: #2e7d32;">⏳ Carregando dados do professor...</p>
      <p style="font-size: 14px; color: #66bb6a;">Por favor, aguarde.</p>
    </div>
  </main>

  <script src="xlsx.mini.min.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
