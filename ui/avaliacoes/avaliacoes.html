<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Importar/Exportar Avaliações em Massa</title>
    <link rel="stylesheet" href="../chamada/chamada.css">
    <link rel="stylesheet" href="avaliacoes.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <h1>Gerenciamento de Avaliações</h1>
                <div class="header-actions" style="display: flex; gap: 10px; align-items: center;">
                    <select id="selectPeriodo" class="form-control" style="max-width: 150px; padding-top: 5px; padding-bottom: 5px; height: auto;">
                        <option value="">Aguarde...</option>
                    </select>
                    
                    <button id="btnExport" class="btn btn-outline" title="Baixar Diários em Lote (Excel)">
                        <i data-lucide="download"></i> Gerar
                    </button>

                    <input type="file" id="fileUpload" accept=".xls,.xlsx" style="display: none;">
                    <button id="btnImport" class="btn btn-outline" title="Carregar Diários Alterados (Excel)">
                        <i data-lucide="upload"></i> Importar
                    </button>
                    
                    <button id="btnVoltar" class="btn btn-secondary" style="margin-left: 10px;">
                        <i data-lucide="arrow-left"></i> Voltar
                    </button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div id="loading" class="loading-state">
                <div class="spinner"></div>
                <p id="loadingText">Aguarde...</p>
            </div>

            <!-- Tabs Navigation -->
            <div class="tabs-container hidden" id="tabsContainer" style="margin-top: 20px; align-items: flex-end;">
                <div id="tabsList" style="display: flex; flex-wrap: wrap; gap: 5px; flex-grow: 1;">
                    <!-- Abas injetadas dinamicamente aqui -->
                </div>
                <button id="btnNovaAba" class="tab-button-add" title="Nova Aba" style="margin-left: 10px; padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer;">
                    <i data-lucide="plus"></i>
                </button>
            </div>

            <!-- Views Container -->
            <div id="tabViewsContainer">
                <!-- Visões ativas das abas renderizadas aqui -->
            </div>

            <!-- Template: Lançamento Direto -->
            <template id="tabTemplate">
                <div class="tab-view" style="margin-top: 20px;">
                    <div class="filtro-container" style="background: var(--surface); padding: 20px; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); margin-bottom: 20px;">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px;">
                            <div>
                                <label class="form-label">Escola</label>
                                <select class="form-control sel-escola"><option value="">Selecione...</option></select>
                            </div>
                            <div>
                                <label class="form-label">Turma</label>
                                <select class="form-control sel-turma" disabled><option value="">Selecione a Escola</option></select>
                            </div>
                            <div>
                                <label class="form-label">Disciplina</label>
                                <select class="form-control sel-disc" disabled><option value="">Selecione a Turma</option></select>
                            </div>
                            <div>
                                <label class="form-label">Período</label>
                                <select class="form-control sel-periodo-diretor"><option value="">Aguarde...</option></select>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <button class="btn btn-primary btn-carregar-tabela" disabled>
                                <i data-lucide="search"></i> Buscar Instrumentos e Lançamentos
                            </button>
                        </div>
                    </div>

                    <!-- Tabela DataGrid Native -->
                    <div class="hidden data-grid-container grid-container-wrapper">
                        <table class="data-grid tb-notas-direto">
                            <thead>
                                <tr class="tb-notas-head-row">
                                    <th style="width: 80px;">Nº Matr.</th>
                                    <th>Nome do Aluno</th>
                                </tr>
                            </thead>
                            <tbody class="tb-notas-body">
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Formato de Espaçador para o Scroll final -->
                    <div style="height: 60px;"></div>

                    <!-- Sticky Footer Actions -->
                    <div class="hidden footer-acoes" style="position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); padding: 15px 30px; border-top: 1px solid var(--border); box-shadow: 0 -4px 10px rgba(0,0,0,0.05); display: flex; justify-content: flex-end; align-items: center; z-index: 100;">
                        <span class="txt-modificacoes" style="margin-right: 20px; color: var(--text-muted); font-size: 0.9rem;">0 alterações pendentes</span>
                        <button class="btn btn-success btn-salvar-direto shadow-md" disabled>
                            <i data-lucide="save"></i> Salvar Lançamentos Aba
                        </button>
                    </div>
                </div>
            </template>
            
            <div id="importModal" class="modal-overlay hidden">
                <div class="modal-content" style="max-width: 600px;">
                    <div class="modal-header">
                        <h2>Validando Planilha <span id="importStatus" style="font-size:0.8rem; font-weight:normal; color:#666;"></span></h2>
                        <button id="btnCloseModal" class="btn-close"><i data-lucide="x"></i></button>
                    </div>
                    <div class="modal-body">
                        <div id="importLog" class="import-log">
                            <!-- Logs de validação / envio serão inseridos aqui -->
                        </div>
                        <div class="progress-bar-container hidden" id="uploadProgressContainer">
                            <div class="progress-bar" id="uploadProgressBar"></div>
                        </div>
                        <div style="text-align: right; margin-top: 15px;">
                            <button id="btnConfirmarUpload" class="btn btn-primary hidden">
                                Confirmar e Enviar Múltiplas Notas
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="toastContainer" class="toast-container"></div>
        </main>
    </div>

    <script src="../libs/lucide.min.js"></script>
    <script src="../../libs/xlsx.full.min.js"></script>
    <script src="../../api/escolaRS.js"></script>
    <script src="../../utils/dom.js"></script>
    <script src="../../services/avaliacoesService.js"></script>
    <script src="avaliacoes.js"></script>
</body>

</html>
