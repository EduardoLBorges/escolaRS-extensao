<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Notas - EscolaRS Export</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

  <header>
    <div class="header-top">
      <h1>Dashboard de Notas</h1>
      <button id="header-refresh" title="Atualizar dados" aria-label="Atualizar dados" type="button">⟳</button>
    </div>

    <p id="professor-info"></p>
    <p id="export-date"></p>
    <p id="cache-info" style="font-size: 12px; color: #555; margin: 0;"></p>
  </header>

  <main id="dashboard-container">
    <div id="loading">
      <p style="font-size: 16px; color: #2e7d32;">Carregando dados do professor...</p>
      <p style="font-size: 14px; color: #66bb6a;">Por favor, aguarde.</p>
    </div>
    
    <div class="progress-container" id="progress-container">
      <p style="font-size: 16px; color: #2e7d32; margin: 0 0 10px 0;">Carregando turmas</p>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-text" id="progress-text">0%</div>
      <div class="progress-status" id="progress-status">Iniciando carregamento...</div>
    </div>
  </main>

  <script src="../../xlsx.mini.min.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
