<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Notas - EscolaRS Export</title>
  <link rel="stylesheet" href="dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <header>
    <div class="header-main">
      <div class="header-titles">
        <div class="header-user">
          <i data-lucide="user-circle" class="header-avatar"></i>
          <h1 id="professor-info">Carregando...</h1>
        </div>
        <div class="header-meta">
          <span id="export-date"><i data-lucide="clock"></i> <span>Aguarde</span></span>
        </div>
      </div>

      <div class="header-actions">
        <button id="header-refresh" title="Atualizar dados do Portal" aria-label="Atualizar dados" type="button"><i
            data-lucide="refresh-cw"></i> Sincronizar</button>
      </div>
    </div>
    <div id="refresh-progress" class="refresh-progress-container">
      <div id="refresh-progress-bar" class="refresh-progress-bar"></div>
    </div>
  </header>

  <div id="loading">
    <p style="font-size: 16px; color: #2e7d32;">Carregando dados do professor...</p>
    <p style="font-size: 14px; color: #66bb6a;">Por favor, aguarde.</p>
  </div>

  <div class="progress-container" id="progress-container">
    <p style="font-size: 16px; color: #2e7d32; margin: 0 0 10px 0;">Carregando turmas</p>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-text" id="progress-text">0%</div>
    <div class="progress-status" id="progress-status">Iniciando carregamento...</div>
  </div>

  <main id="dashboard-container">
  </main>

  <script src="../libs/lucide.min.js"></script>
  <script src="../../libs/xlsx.mini.min.js"></script>
  <script src="../../utils/dom.js"></script>
  <script src="../../utils/aluno.js"></script>
  <script src="../../utils/string.js"></script>
  <script src="../../utils/notas.js"></script>
  <script src="../../services/dashboardService.js"></script>
  <script src="../../services/exportService.js"></script>
  <script src="dashboard.js"></script>
</body>

</html>
